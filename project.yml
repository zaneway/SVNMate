name: SVNMate
options:
  bundleIdPrefix: com.svnclient
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    PRODUCT_NAME: SVNMate

targets:
  SVNMate:
    type: application
    platform: macOS
    sources:
      - path: SVNMate/Sources
        excludes:
          - Assets.xcassets
      - path: SVNMate/Sources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: SVNMate/Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.svnclient.svn-mate
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SVNMate/Sources/SVNMate.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
